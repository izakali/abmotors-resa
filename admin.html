<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - AB MOTORS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; -webkit-user-select: none; user-select: none; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #002157; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; background: #e0e0e0; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .nav-btn.active { background: #002157; color: white; }
        .calendar-wrapper { display: flex; gap: 20px; flex-wrap: wrap; }
        .month-container { flex: 1; min-width: 300px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; }
        .month-header { text-align: center; font-weight: bold; color: #002157; margin-bottom: 15px; text-transform: uppercase; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 12px; color: #888; margin-bottom: 10px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 4px; cursor: pointer; position: relative; background: #f9f9f9; color: #ccc; border: 1px solid transparent; transition: 0.2s; }
        .cal-day.available { background-color: #f0f8ff; color: #002157; font-weight: bold; border-color: #cce5ff; }
        .cal-day.available:hover { border-color: #002157; }
        .cal-day.selected-admin { background-color: #002157; color: white; transform: scale(1.05); }
        .cal-day:hover:not(.past) { border-color: #002157; }
        .empty-day { aspect-ratio: 1; }
        .time-dot-container { display: flex; gap: 3px; position: absolute; bottom: 3px; }
        .time-dot { width: 6px; height: 6px; border-radius: 50%; }
        .time-dot.matin { background-color: #f6ad55; }
        .time-dot.aprem { background-color: #4fd1c5; }
        .cal-day.selected-admin .time-dot { background-color: #fff; }
        .legend { margin-top: 15px; font-size: 13px; color: #666; display: flex; gap: 15px; }
        .legend div { display: flex; align-items: center; gap: 5px; }
        .inline-editor { background: #f0f8ff; border: 1px solid #cce5ff; padding: 15px; border-radius: 8px; margin-top: 15px; display: flex; gap: 20px; align-items: center; }
        .inline-editor h3 { margin: 0; color: #002157; font-size: 16px; }
        .inline-editor label { cursor: pointer; font-weight: bold; color: #333; display:flex; align-items:center; gap:5px;}
        .inline-editor input { width: 18px; height: 18px; cursor:pointer;}
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; min-width: 700px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { color: #002157; }
        .badge { display: inline-block; white-space: nowrap; padding: 6px 10px; border-radius: 12px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .badge.attente { background: #fff8f0; color: #b7791f; border: 1px solid #fbd38d; }
        .badge.confirmee { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .btn-action { cursor: pointer; padding: 6px 12px; border: none; border-radius: 4px; color: white; font-weight: bold; margin-bottom:4px; display:block; width:100%; font-size:12px; }
        .btn-paye { background: #28a745; }
        .btn-non-paye { background: #f6ad55; }
        .btn-suppr { background: #e53e3e; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-btn { background: #00a8cc; color:white; border:none; border-radius:4px; font-size: 14px; padding: 8px 15px; cursor:pointer;}
        .loader { display: none; margin-left: 10px; font-size: 14px; color: #666; font-weight: normal; }
        .search-box { margin-bottom: 15px; width: 100%; max-width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing:border-box;}
        @media (max-width: 768px) { body { padding: 10px; } .admin-container { padding: 15px; } h1 { flex-direction: column; align-items: flex-start; gap: 10px; font-size: 20px; } .nav { flex-wrap: wrap; } .nav-btn { flex: 1; text-align: center; } .calendar-wrapper { flex-direction: column; } .month-container { min-width: 100%; } .inline-editor { flex-direction: column; align-items: flex-start; } .search-box { max-width: 100%; } }
    </style>
</head>
<body>
    <script>
        document.onkeydown = function(e) { if(e.keyCode == 123) return false; if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; }
    </script>

    <div id="login-container" style="max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">
        <h2 style="color: #002157; margin-top:0;">Connexion Admin</h2>
        <input type="text" id="auth-user" class="form-control" placeholder="Nom d'utilisateur" style="margin-bottom: 15px;">
        <input type="password" id="auth-pin" class="form-control" placeholder="Code PIN" style="margin-bottom: 15px;">
        <button class="refresh-btn" style="width:100%; padding:12px; font-size:16px;" onclick="login()">Se connecter</button>
        <div id="auth-error" style="color: red; margin-top: 15px; display: none; font-weight:bold;">Identifiants incorrects.</div>
    </div>

    <div class="admin-container" id="main-admin-ui" style="display: none;">
        <h1>Dashboard Admin <button class="refresh-btn" onclick="fetchData()">Rafraîchir <span id="main-loader" class="loader">⏳</span></button></h1>
        <div class="nav">
            <div class="nav-btn active" id="btn-dates" onclick="setView('dates')">Gérer les Dates</div>
            <div class="nav-btn" id="btn-res" onclick="setView('res')">Voir les Réservations</div>
        </div>
        <div id="content">Chargement des données...</div>
    </div>

    <script>
        const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxv_TQQ-HLA7jMStWDIEpDNlIlUpN44GRbhVQIbYlxxiyQKRVvLRiJOLSB_i4Yz4OKn/exec';
        let serverDates = {}; let serverBookings = []; let currentView = 'dates'; let adminMonthOffset = 0; let selectedDates = new Set();
        const monthsNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        async function login() {
            const u = document.getElementById('auth-user').value.trim(); const p = document.getElementById('auth-pin').value.trim();
            if(!u || !p) return;
            document.getElementById('auth-error').style.display = 'none';
            const btn = document.querySelector('#login-container button'); btn.innerText = "Vérification..."; btn.disabled = true;
            try {
                const res = await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'verify_auth', user: u, pin: p }) });
                const data = await res.json();
                if(data.success) { document.getElementById('login-container').style.display = 'none'; document.getElementById('main-admin-ui').style.display = 'block'; fetchData(); }
                else { document.getElementById('auth-error').style.display = 'block'; }
            } catch(e) { alert("Erreur de connexion."); }
            btn.innerText = "Se connecter"; btn.disabled = false;
        }

        async function fetchData() {
            document.getElementById('main-loader').style.display = 'inline-block';
            try {
                const response = await fetch(GOOGLE_WEB_APP_URL, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                serverDates = data.dates || {}; serverBookings = data.bookings || []; render();
            } catch (err) { document.getElementById('content').innerHTML = `Erreur réseau.`; }
            document.getElementById('main-loader').style.display = 'none';
        }

        const setView = (v) => { currentView = v; document.getElementById('btn-dates').className = `nav-btn ${v==='dates'?'active':''}`; document.getElementById('btn-res').className = `nav-btn ${v==='res'?'active':''}`; render(); };
        window.changeAdminMonth = (dir) => { adminMonthOffset += dir; render(); };
        window.toggleDate = (dStr) => { if (selectedDates.has(dStr)) selectedDates.delete(dStr); else selectedDates.add(dStr); renderCalendarOnly(); };
        window.clearSelection = () => { selectedDates.clear(); renderCalendarOnly(); };

        window.applyBulkDispo = async () => {
            if (selectedDates.size === 0) return;
            const isM = document.getElementById('bulk-matin').checked; const isA = document.getElementById('bulk-aprem').checked;
            const newDispo = (isM || isA) ? {m: isM, a: isA} : null;
            document.getElementById('main-loader').style.display = 'inline-block';
            const promises = [...selectedDates].map(dStr => fetch(GOOGLE_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'update_dates', dateStr: dStr, dispo: newDispo }) }));
            await Promise.all(promises); selectedDates.clear(); fetchData();
        };

        window.validerRes = async (id, statusPayment) => {
            const booking = serverBookings.find(b => b.id == id);
            if(!booking) return;
            const btn = document.getElementById('btn-valider-' + id);
            if(btn) { btn.disabled = true; btn.innerText = "Génération..."; }

            try {
                const res = await fetch(GOOGLE_WEB_APP_URL, {
                    method: 'POST', redirect: 'follow',
                    body: JSON.stringify({ 
                        action: 'validate_booking', 
                        id: booking.id, email: booking.email, contact: booking.contact, 
                        statusPayment: statusPayment, details: booking.details, 
                        pax: booking.pax, total: booking.total, 
                        passengersData: booking.passengersData, phone: booking.phone 
                    })
                });
                const responseData = await res.json();
                
                if(responseData.result === "success") {
                    alert("Statut mis à jour et PDF généré et envoyé via DocSpring !");
                } else {
                    alert("Erreur: " + responseData.message);
                }
                await fetchData();
            } catch (err) {
                alert("Erreur lors de la communication avec le serveur.");
                if(btn) { btn.disabled = false; btn.innerText = "Valider"; }
            }
        };

        window.supprRes = async (id) => { if(confirm('Supprimer ?')) { await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete_booking', id: id }) }); fetchData(); } };

        const renderCalendarOnly = () => {
            const d = new Date(); d.setMonth(d.getMonth() + adminMonthOffset);
            const wrapper = document.getElementById('cal-wrapper'); if (!wrapper) return;
            let nextM = d.getMonth() + 1, nextY = d.getFullYear(); if (nextM > 11) { nextM = 0; nextY++; }
            wrapper.innerHTML = renderMonthAdmin(d.getFullYear(), d.getMonth()) + renderMonthAdmin(nextY, nextM);
            updateBulkPanel();
        };

        const updateBulkPanel = () => {
            const panel = document.getElementById('bulk-panel'); if (!panel) return;
            if (selectedDates.size === 0) { panel.innerHTML = `<p style="font-size:13px;">Sélectionnez des jours.</p>`; return; }
            panel.innerHTML = `<div class="inline-editor"><b>${selectedDates.size} sélectionnés</b><label><input type="checkbox" id="bulk-matin" checked> Matin</label><label><input type="checkbox" id="bulk-aprem"> Aprem</label><button class="refresh-btn" onclick="applyBulkDispo()">Appliquer</button><button class="refresh-btn" style="background:#e53e3e;" onclick="clearSelection()">Annuler</button></div>`;
        };

        const renderMonthAdmin = (year, month) => {
            let html = `<div class="month-container"><div class="month-header">${monthsNames[month]} ${year}</div><div class="weekdays"><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div></div><div class="days-grid">`;
            let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<firstDay; i++) html += `<div class="empty-day"></div>`;
            const todayStr = new Date().toISOString().split('T')[0];
            for(let d=1; d<=daysInMonth; d++) {
                let dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if (dStr < todayStr) { html += `<div class="cal-day past" style="opacity:0.3;">${d}</div>`; continue; }
                let isAvail = serverDates[dStr]; let isSelected = selectedDates.has(dStr);
                let dots = isAvail ? `<div class="time-dot-container">${isAvail.m?'<div class="time-dot matin"></div>':''}${isAvail.a?'<div class="time-dot aprem"></div>':''}</div>` : '';
                html += `<div class="cal-day ${isAvail?'available':''} ${isSelected?'selected-admin':''}" onclick="toggleDate('${dStr}')">${d}${dots}</div>`;
            }
            return html + `</div></div>`;
        };

        window.updateTable = () => {
            const container = document.getElementById('table-container'); if (!container) return;
            const searchVal = document.getElementById('search-input') ? document.getElementById('search-input').value.trim().toLowerCase() : "";
            let html = `<div class="table-responsive"><table><tr><th>ID</th><th>Client</th><th>Trajet</th><th>Total</th><th>Statut</th><th>Action</th></tr>`;
            serverBookings.filter(b => searchVal === "" || String(b.id).includes(searchVal)).forEach(b => {
                const sl = b.status.toLowerCase();
                let btns = sl === 'en attente' ? `<button class="btn-action btn-paye" onclick="validerRes(${b.id}, 'payé')">Valider (PAYÉ)</button><button class="btn-action btn-non-paye" onclick="validerRes(${b.id}, 'non payé')">Valider (SUR PLACE)</button>` : '';
                if (sl === 'confirmée et non payée') btns = `<button class="btn-action btn-paye" onclick="validerRes(${b.id}, 'payé')">Marquer PAYÉ</button>`;
                html += `<tr><td>${b.id}</td><td>${b.contact}<br>${b.phone}</td><td style="font-size:11px;">${b.details}</td><td>${b.total}€</td><td><span class="badge ${sl==='confirmée et payée'?'confirmee':'attente'}">${b.status}</span></td><td>${btns}<button class="btn-action btn-suppr" onclick="supprRes(${b.id})">X</button></td></tr>`;
            });
            container.innerHTML = html + `</table></div>`;
        };

        const render = () => {
            const content = document.getElementById('content');
            if (currentView === 'dates') {
                const d = new Date(); d.setMonth(d.getMonth() + adminMonthOffset);
                let nextM = d.getMonth() + 1, nextY = d.getFullYear(); if(nextM > 11) { nextM = 0; nextY++; }
                content.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:15px;"><p>Gérez les dates.</p><div><button class="refresh-btn" onclick="changeAdminMonth(-1)">←</button><button class="refresh-btn" onclick="changeAdminMonth(1)">→</button></div></div><div id="cal-wrapper" class="calendar-wrapper">${renderMonthAdmin(d.getFullYear(), d.getMonth())}${renderMonthAdmin(nextY, nextM)}</div><div id="bulk-panel"></div>`;
            } else {
                content.innerHTML = `<input type="text" id="search-input" class="search-box" placeholder="Rechercher ID" oninput="updateTable()"><div id="table-container"></div>`;
                updateTable();
            }
        };
    </script>
</body>
</html>
