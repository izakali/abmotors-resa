<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - AB MOTORS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #002157; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; background: #e0e0e0; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .nav-btn.active { background: #002157; color: white; }
        
        /* CALENDRIER ADMIN */
        .calendar-wrapper { display: flex; gap: 20px; flex-wrap: wrap; }
        .month-container { flex: 1; min-width: 300px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; }
        .month-header { text-align: center; font-weight: bold; color: #002157; margin-bottom: 15px; text-transform: uppercase; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 12px; color: #888; margin-bottom: 10px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 4px; cursor: pointer; position: relative; background: #f9f9f9; color: #ccc; border: 1px solid transparent; transition: 0.2s; }
        .cal-day.available { background-color: #f0f8ff; color: #002157; font-weight: bold; border-color: #cce5ff; }
        .cal-day.available:hover { border-color: #002157; }
        .cal-day:hover:not(.past) { border-color: #002157; }
        .empty-day { aspect-ratio: 1; }
        
        .time-dot-container { display: flex; gap: 3px; position: absolute; bottom: 3px; }
        .time-dot { width: 6px; height: 6px; border-radius: 50%; }
        .time-dot.matin { background-color: #f6ad55; }
        .time-dot.aprem { background-color: #4fd1c5; }
        
        .legend { margin-top: 15px; font-size: 13px; color: #666; display: flex; gap: 15px; }
        .legend div { display: flex; align-items: center; gap: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { color: #002157; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .badge.attente { background: #fff8f0; color: #b7791f; border: 1px solid #fbd38d; }
        .badge.confirmee { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        button { cursor: pointer; padding: 5px 10px; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .btn-valider { background: #f6ad55; }
        .btn-suppr { background: #e53e3e; }
        .btn-valider:disabled, .btn-suppr:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-btn { background: #00a8cc; font-size: 14px; padding: 8px 15px; }
        .loader { display: none; margin-left: 10px; font-size: 14px; color: #666; font-weight: normal; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Dashboard Admin <button class="refresh-btn" onclick="fetchData()">Rafraîchir <span id="main-loader" class="loader">⏳</span></button></h1>
        <div class="nav">
            <div class="nav-btn active" id="btn-dates" onclick="setView('dates')">Gérer les Dates</div>
            <div class="nav-btn" id="btn-res" onclick="setView('res')">Voir les Réservations</div>
        </div>
        <div id="content">Chargement des données...</div>
    </div>

    <script>
        const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxv_TQQ-HLA7jMStWDIEpDNlIlUpN44GRbhVQIbYlxxiyQKRVvLRiJOLSB_i4Yz4OKn/exec';

        let serverDates = {};
        let serverBookings = [];
        let currentView = 'dates';
        const monthsNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        async function fetchData() {
            document.getElementById('main-loader').style.display = 'inline-block';
            try {
                const response = await fetch(GOOGLE_WEB_APP_URL, { method: 'GET', redirect: 'follow' });
                if (!response.ok) throw new Error("HTTP error");
                const data = await response.json();
                serverDates = data.dates || {};
                serverBookings = data.bookings || [];
                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `<div style="color:red; font-weight:bold;">Erreur réseau. Vérifiez votre URL Google.</div>`;
            }
            document.getElementById('main-loader').style.display = 'none';
        }

        const setView = (v) => { 
            currentView = v; 
            document.getElementById('btn-dates').className = `nav-btn ${v==='dates'?'active':''}`;
            document.getElementById('btn-res').className = `nav-btn ${v==='res'?'active':''}`;
            render(); 
        };

        window.editDispo = async (dateStr) => {
            const res = prompt(`Gérer le ${dateStr} (Tapez M, A, MA, ou 0 pour fermer la date):`);
            if(!res) return;
            const v = res.trim().toUpperCase();
            
            let newDispo = null;
            if(v === 'M') newDispo = {m:true, a:false};
            else if(v === 'A') newDispo = {m:false, a:true};
            else if(v === 'MA') newDispo = {m:true, a:true};
            else if(v === '0') newDispo = null;
            else { alert("Saisie invalide"); return; }

            document.getElementById('main-loader').style.display = 'inline-block';
            try {
                await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'update_dates', dateStr: dateStr, dispo: newDispo }) });
                await fetchData(); 
            } catch (e) {
                alert("Erreur lors de la sauvegarde."); document.getElementById('main-loader').style.display = 'none';
            }
        };

        window.validerRes = async (id) => {
            // (La fonction PDF reste identique)
            const booking = serverBookings.find(b => b.id == id);
            if(!booking) return;
            const btn = document.getElementById('btn-valider-' + id);
            btn.disabled = true; btn.innerText = "Envoi...";
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFontSize(22); doc.setTextColor(0, 33, 87); doc.text("AB MOTORS", 105, 20, null, null, "center");
            doc.setFontSize(16); doc.setTextColor(0, 0, 0); doc.text("Confirmation de Réservation", 105, 30, null, null, "center");
            doc.setFontSize(12); doc.text(`Numéro de réservation : #${booking.id}`, 20, 50); doc.text(`Nom : ${booking.contact}`, 20, 60); doc.text(`Email : ${booking.email}`, 20, 70); doc.text(`Téléphone : ${booking.phone}`, 20, 80); doc.text(`Détails du Trajet :`, 20, 100); doc.text(booking.details, 20, 110); doc.text(`Total Passagers : ${booking.pax}`, 20, 130);
            doc.setFontSize(14); doc.text(`MONTANT PAYÉ / TOTAL : ${booking.total} EUR`, 20, 150);
            const pdfBase64 = doc.output('datauristring').split(',')[1];
            try {
                await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'validate_booking', id: booking.id, email: booking.email, contact: booking.contact, pdfBase64: pdfBase64 }) });
                alert("Validée et PDF envoyé !"); await fetchData();
            } catch (err) { alert("Erreur d'envoi."); btn.disabled = false; btn.innerText = "Valider"; }
        };

        window.supprRes = async (id) => {
            if(confirm('Supprimer cette réservation ?')) {
                document.getElementById('main-loader').style.display = 'inline-block';
                await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'delete_booking', id: id }) });
                await fetchData();
            }
        };

        const renderMonthAdmin = (year, month) => {
            let html = `<div class="month-container"><div class="month-header">${monthsNames[month]} ${year}</div>`;
            html += `<div class="weekdays"><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div></div><div class="days-grid">`;
            let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<firstDay; i++) html += `<div class="empty-day"></div>`;
            
            const todayStr = new Date().toISOString().split('T')[0];
            
            for(let d=1; d<=daysInMonth; d++) {
                let dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                if (dStr < todayStr) {
                    html += `<div class="cal-day past" style="opacity:0.3; cursor:not-allowed;">${d}</div>`;
                    continue;
                }

                let dispo = serverDates[dStr];
                let isAvail = dispo && (dispo.m || dispo.a);
                let cssClass = isAvail ? 'available' : '';
                
                let dotsHTML = '';
                if(isAvail) {
                    dotsHTML = `<div class="time-dot-container">`;
                    if(dispo.m) dotsHTML += `<div class="time-dot matin"></div>`;
                    if(dispo.a) dotsHTML += `<div class="time-dot aprem"></div>`;
                    dotsHTML += `</div>`;
                }

                html += `<div class="cal-day ${cssClass}" onclick="editDispo('${dStr}')">${d}${dotsHTML}</div>`;
            }
            return html + `</div></div>`;
        };

        const render = () => {
            const content = document.getElementById('content');
            if (currentView === 'dates') {
                const d = new Date();
                let html = `<p>Cliquez sur un jour pour ouvrir/fermer les traversées. Les points de couleurs indiquent les créneaux ouverts.</p>`;
                html += `<div class="legend"><div><span class="time-dot matin"></span> Matin</div><div><span class="time-dot aprem"></span> Après-midi</div></div><br>`;
                html += `<div class="calendar-wrapper">` + renderMonthAdmin(d.getFullYear(), d.getMonth());
                let nextM = d.getMonth() + 1, nextY = d.getFullYear();
                if(nextM > 11) { nextM = 0; nextY++; }
                html += renderMonthAdmin(nextY, nextM) + `</div>`;
                content.innerHTML = html;
            } else {
                let html = `<table><tr><th>ID</th><th>Client</th><th>Trajet & Date</th><th>Pax</th><th>Total</th><th>Statut</th><th>Action</th></tr>`;
                serverBookings.forEach(b => {
                    html += `<tr><td>#${b.id}</td><td>${b.contact}<br><small>${b.phone}<br>${b.email}</small></td><td style="font-size:11px;">${b.details}</td><td>${b.pax}</td><td>${b.total}€</td>
                    <td><span class="badge ${b.status === 'confirmée' ? 'confirmee' : 'attente'}">${b.status}</span></td>
                    <td>${(b.status && b.status.toLowerCase() === 'en attente') ? `<button id="btn-valider-${b.id}" class="btn-valider" onclick="validerRes(${b.id})">Valider & PDF</button>` : ''} <button class="btn-suppr" onclick="supprRes(${b.id})">X</button></td></tr>`;
                });
                if(serverBookings.length === 0) html += `<tr><td colspan="7" style="text-align:center">Aucune réservation pour le moment.</td></tr>`;
                content.innerHTML = html + `</table>`;
            }
        };

        fetchData();
    </script>
</body>
</html>
