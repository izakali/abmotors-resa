<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - AB MOTORS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }

        /* ===== LOGIN ===== */
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #002157 0%, #004aad 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center; }
        .login-box img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #002157; }
        .login-box h2 { color: #002157; margin: 0 0 5px; font-size: 20px; }
        .login-box p { color: #888; font-size: 13px; margin: 0 0 25px; }
        .login-input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; margin-bottom: 12px; box-sizing: border-box; transition: border-color 0.2s; }
        .login-input:focus { outline: none; border-color: #002157; }
        .login-btn { width: 100%; padding: 13px; background: #002157; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .login-btn:hover { background: #003a8c; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #login-error { color: #dc3545; font-size: 13px; margin-top: 10px; display: none; }

        /* ===== ADMIN ===== */
        #admin-app { display: none; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #002157; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; background: #e0e0e0; cursor: pointer; border-radius: 6px; font-weight: bold; border: none; font-size: 14px; }
        .nav-btn.active { background: #002157; color: white; }
        .calendar-wrapper { display: flex; gap: 20px; flex-wrap: wrap; }
        .month-container { flex: 1; min-width: 300px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; }
        .month-header { text-align: center; font-weight: bold; color: #002157; margin-bottom: 15px; text-transform: uppercase; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 12px; color: #888; margin-bottom: 10px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 4px; cursor: pointer; position: relative; background: #f9f9f9; color: #ccc; border: 1px solid transparent; transition: 0.2s; }
        .cal-day.available { background-color: #f0f8ff; color: #002157; font-weight: bold; border-color: #cce5ff; }
        .cal-day.available:hover { border-color: #002157; }
        .cal-day.selected-admin { background-color: #002157; color: white; transform: scale(1.05); }
        .cal-day:hover:not(.past) { border-color: #002157; }
        .empty-day { aspect-ratio: 1; }
        .time-dot-container { display: flex; gap: 3px; position: absolute; bottom: 3px; }
        .time-dot { width: 6px; height: 6px; border-radius: 50%; }
        .time-dot.matin { background-color: #f6ad55; }
        .time-dot.aprem { background-color: #4fd1c5; }
        .cal-day.selected-admin .time-dot { background-color: #fff; }
        .legend { margin-top: 15px; font-size: 13px; color: #666; display: flex; gap: 15px; }
        .legend div { display: flex; align-items: center; gap: 5px; }
        .inline-editor { background: #f0f8ff; border: 1px solid #cce5ff; padding: 15px; border-radius: 8px; margin-top: 15px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; min-width: 700px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { color: #002157; }
        .badge { display: inline-block; white-space: nowrap; padding: 6px 10px; border-radius: 12px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .badge.attente { background: #fff8f0; color: #b7791f; border: 1px solid #fbd38d; }
        .badge.confirmee { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .btn-action { cursor: pointer; padding: 6px 12px; border: none; border-radius: 4px; color: white; font-weight: bold; margin-bottom: 4px; display: block; width: 100%; font-size: 12px; }
        .btn-paye { background: #28a745; }
        .btn-non-paye { background: #f6ad55; }
        .btn-suppr { background: #e53e3e; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-btn { background: #00a8cc; color: white; border: none; border-radius: 4px; font-size: 14px; padding: 8px 15px; cursor: pointer; }
        .loader-spin { display: none; margin-left: 10px; font-size: 14px; color: #666; font-weight: normal; }
        .search-box { margin-bottom: 15px; width: 100%; max-width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .logout-btn { background: #e53e3e; color: white; border: none; border-radius: 4px; padding: 8px 15px; cursor: pointer; font-size: 13px; font-weight: bold; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .admin-container { padding: 15px; }
            h1 { font-size: 18px; }
            .nav { flex-wrap: wrap; }
            .nav-btn { flex: 1; text-align: center; }
            .calendar-wrapper { flex-direction: column; }
            .month-container { min-width: 100%; }
            .search-box { max-width: 100%; }
        }
    </style>
</head>
<body>

<!-- ===== ÉCRAN DE CONNEXION ===== -->
<div id="login-screen">
    <div class="login-box">
        <img src="Gemini_Generabbted_Image_.png" alt="AB Motors">
        <h2>AB MOTORS</h2>
        <p>Espace Administration</p>
        <input type="text" class="login-input" id="login-user" placeholder="Nom d'utilisateur" autocomplete="username">
        <input type="password" class="login-input" id="login-pin" placeholder="Code PIN" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
        <button class="login-btn" id="login-btn" onclick="doLogin()">Se connecter</button>
        <div id="login-error">Identifiants incorrects. Réessayez.</div>
    </div>
</div>

<!-- ===== APPLICATION ADMIN ===== -->
<div id="admin-app">
    <div class="admin-container">
        <h1>
            Dashboard Admin
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <button class="refresh-btn" onclick="fetchData()">Rafraîchir <span id="main-loader" class="loader-spin">⏳</span></button>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>
        </h1>
        <div class="nav">
            <button class="nav-btn active" id="btn-dates" onclick="setView('dates')">Gérer les Dates</button>
            <button class="nav-btn" id="btn-res" onclick="setView('res')">Voir les Réservations</button>
        </div>
        <div id="content">Chargement des données...</div>
    </div>
</div>

<script>
// ===== PROTECTION CODE SOURCE =====
(function() {
    document.addEventListener('keydown', function(e) {
        if (e.keyCode === 123) { e.preventDefault(); e.stopPropagation(); return false; }
        if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); e.stopPropagation(); return false; }
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); e.stopPropagation(); return false; }
        if (e.metaKey && e.keyCode === 85) { e.preventDefault(); e.stopPropagation(); return false; }
        if (e.metaKey && e.altKey && e.keyCode === 73) { e.preventDefault(); e.stopPropagation(); return false; }
    }, true);
})();

const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxv_TQQ-HLA7jMStWDIEpDNlIlUpN44GRbhVQIbYlxxiyQKRVvLRiJOLSB_i4Yz4OKn/exec';

// ===== GESTION SESSION =====
const SESSION_KEY = 'abm_admin_auth';
const SESSION_DURATION = 6 * 60 * 60 * 1000;

function getSession() {
    try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch(e) { return null; }
}
function isAuthenticated() {
    const s = getSession();
    if (!s) return false;
    if (Date.now() - s.lastActivity > SESSION_DURATION) { sessionStorage.removeItem(SESSION_KEY); return false; }
    return true;
}
function refreshSession() {
    const s = getSession();
    if (s) { s.lastActivity = Date.now(); sessionStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
}
function setSession(username) {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ username, loginTime: Date.now(), lastActivity: Date.now() }));
}
function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('admin-app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pin').value = '';
}

async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const pin = document.getElementById('login-pin').value.trim();
    const btn = document.getElementById('login-btn');
    const errDiv = document.getElementById('login-error');
    if (!username || !pin) { errDiv.style.display = 'block'; errDiv.textContent = 'Remplissez tous les champs.'; return; }
    btn.disabled = true; btn.textContent = 'Connexion...'; errDiv.style.display = 'none';
    try {
        const res = await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'check_credentials', username, pin }) });
        const data = await res.json();
        if (data.valid) {
            setSession(username);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-app').style.display = 'block';
            fetchData();
        } else {
            errDiv.textContent = 'Identifiants incorrects. Réessayez.';
            errDiv.style.display = 'block';
        }
    } catch(e) {
        errDiv.textContent = 'Erreur de connexion au serveur.';
        errDiv.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = 'Se connecter';
}

// ===== DONNÉES =====
let serverDates = {};
let serverBookings = [];
let currentView = 'dates';
let adminMonthOffset = 0;
let selectedDates = new Set();
const monthsNames = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

const loadImage = (url) => new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
});

async function fetchData() {
    if (!isAuthenticated()) { logout(); return; }
    refreshSession();
    document.getElementById('main-loader').style.display = 'inline-block';
    try {
        const response = await fetch(GOOGLE_WEB_APP_URL, { method: 'GET', redirect: 'follow' });
        if (!response.ok) throw new Error("HTTP error");
        const data = await response.json();
        serverDates = data.dates || {};
        serverBookings = data.bookings || [];
        render();
    } catch (err) {
        document.getElementById('content').innerHTML = `<div style="color:red;font-weight:bold;">Erreur réseau.</div>`;
    }
    document.getElementById('main-loader').style.display = 'none';
}

const setView = (v) => {
    currentView = v;
    document.getElementById('btn-dates').className = `nav-btn ${v==='dates'?'active':''}`;
    document.getElementById('btn-res').className = `nav-btn ${v==='res'?'active':''}`;
    render();
};

window.changeAdminMonth = (dir) => { adminMonthOffset += dir; render(); };
window.toggleDate = (dStr) => { if(selectedDates.has(dStr)) selectedDates.delete(dStr); else selectedDates.add(dStr); renderCalendarOnly(); };
window.clearSelection = () => { selectedDates.clear(); renderCalendarOnly(); };

window.applyBulkDispo = async () => {
    if (selectedDates.size === 0) return;
    const isM = document.getElementById('bulk-matin').checked;
    const isA = document.getElementById('bulk-aprem').checked;
    const newDispo = (isM || isA) ? {m: isM, a: isA} : null;
    document.getElementById('main-loader').style.display = 'inline-block';
    document.getElementById('bulk-btn').disabled = true;
    document.getElementById('bulk-btn').innerText = 'Sauvegarde...';
    const promises = [...selectedDates].map(dStr =>
        fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'update_dates', dateStr: dStr, dispo: newDispo }) })
        .then(() => { if (newDispo) serverDates[dStr] = newDispo; else delete serverDates[dStr]; })
    );
    try { await Promise.all(promises); selectedDates.clear(); render(); } catch(e) { alert("Erreur lors de la sauvegarde groupée."); }
    document.getElementById('main-loader').style.display = 'none';
};

// ===== GÉNÉRATION PDF =====
window.validerRes = async (id, statusPayment) => {
    const booking = serverBookings.find(b => b.id == id);
    if (!booking) return;
    const fullStatus = statusPayment === 'payé' ? 'Confirmée et payée' : 'Confirmée et non payée';
    const btn = document.getElementById('btn-valider-' + id);
    if (btn) { btn.disabled = true; btn.innerText = "Génération PDF..."; }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const pageW = 210;

    // Colonnes : gauche et droite
    const leftX = 15;
    const rightX = 110;

    // Offsets fixes pour les valeurs (après les labels)
    // Ces nombres représentent la largeur approximative de chaque label en mm à fontSize 10
    const VAL_REF       = leftX + 65;   // après "Numéro de réservation / Booking Ref :"
    const VAL_AGENCE    = rightX + 58;  // après "Agence émettrice / Issuing office :"
    const VAL_PASSAGER  = leftX + 40;   // après "Passager / Passenger :"
    const VAL_TEL       = leftX + 21;   // après "Téléphone :"
    const VAL_DATE      = rightX + 61;  // après "Date d'émission / Date of Issuance :"

    // ===== PAGE 1 : logo seul en haut à gauche, sans bandes =====
    const imgLogo = await loadImage('unnammmed.png');
    if (imgLogo) {
        const logoW = 38;
        const ratio = imgLogo.naturalHeight / imgLogo.naturalWidth;
        const logoH = Math.min(logoW * ratio, 38);
        doc.addImage(imgLogo, 'PNG', 5, 5, logoW, logoH);
    }

    // ===== TITRE =====
    let y = 48;
    doc.setFontSize(14);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(0, 0, 0);
    doc.text("Votre reçu d'achat de services / Booking Receipt", pageW / 2, y, { align: 'center' });

    // ===== SECTION INFO =====
    y += 14;
    doc.setFontSize(10);

    // Ligne 1 : Numéro de réservation | Agence émettrice
    doc.setFont("helvetica", "bold");
    doc.text("Numéro de réservation / Booking Ref :", leftX, y);
    doc.setFont("helvetica", "normal");
    doc.text(String(booking.id), VAL_REF, y);

    doc.setFont("helvetica", "bold");
    doc.text("Agence émettrice / Issuing office :", rightX, y);
    doc.setFont("helvetica", "normal");
    doc.text("AB MOTORS", VAL_AGENCE, y);

    y += 7;
    // Ligne 2 : Passager | Tel agence 1
    doc.setFont("helvetica", "bold");
    doc.text("Passager / Passenger :", leftX, y);
    doc.setFont("helvetica", "normal");
    doc.text(booking.contact || '', VAL_PASSAGER, y);
    doc.text("(+269) 3315118", rightX, y);

    y += 7;
    // Ligne 3 : Téléphone client | Tel agence 2
    doc.setFont("helvetica", "bold");
    doc.text("Téléphone :", leftX, y);
    doc.setFont("helvetica", "normal");
    doc.text(booking.phone || '', VAL_TEL, y);
    doc.text("(+269) 4350423", rightX, y);

    y += 7;
    // Ligne 4 : Date d'émission (colonne droite seulement)
    doc.setFont("helvetica", "bold");
    doc.text("Date d'émission / Date of Issuance :", rightX, y);
    doc.setFont("helvetica", "normal");
    doc.text(new Date().toLocaleDateString('fr-FR'), VAL_DATE, y);

    // ===== TABLEAU TRAJET =====
    y += 14;
    doc.setFillColor(230, 230, 230);
    doc.rect(leftX, y, 180, 10, 'F');
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.text("Trajet / Route", leftX + 3, y + 7);
    doc.text("Dates / Horaires", leftX + 58, y + 7);
    doc.text("Statut", leftX + 118, y + 7);
    doc.text("Passagers", leftX + 153, y + 7);

    y += 10;
    doc.setFont("helvetica", "normal");
    const routeParts = (booking.details || '').split('|');
    const routeText = routeParts[0] ? routeParts[0].trim() : '';
    const datesText = routeParts.slice(1).map(p => p.trim()).join(' / ');

    const adulteMatch = (booking.pax || '').match(/(\d+)\s*Adulte/);
    const enfantMatch = (booking.pax || '').match(/(\d+)\s*Enfant/);
    const nAdultes = adulteMatch ? parseInt(adulteMatch[1]) : 0;
    const nEnfants = enfantMatch ? parseInt(enfantMatch[1]) : 0;
    const totalPax = nAdultes + nEnfants;

    doc.text(routeText, leftX + 3, y + 8);
    const datesLines = doc.splitTextToSize(datesText, 55);
    doc.text(datesLines, leftX + 58, y + 8);
    doc.text("Confirmé", leftX + 118, y + 8);
    doc.text(String(totalPax), leftX + 158, y + 8);

    doc.setDrawColor(200);
    doc.line(leftX, y + 12, 195, y + 12);
    y += 22;

    // ===== TABLEAU PASSAGERS =====
    let passengers = [];
    try { if (booking.passengers) passengers = JSON.parse(booking.passengers); } catch(e) {}
    if (passengers.length === 0) {
        for (let i = 0; i < nAdultes; i++) {
            const parts = (booking.contact || '').split(' ');
            passengers.push({ nom: parts[0] || booking.contact, prenom: parts.slice(1).join(' ') || '', type: 'Adulte' });
        }
        for (let i = 0; i < nEnfants; i++) passengers.push({ nom: '—', prenom: '', type: 'Enfant' });
    }

    // En-tête tableau passagers
    doc.setFillColor(230, 230, 230);
    doc.rect(leftX, y, 180, 10, 'F');
    doc.setFont("helvetica", "bold");
    doc.text("Passager", leftX + 3, y + 7);
    doc.text("Type de passager", leftX + 75, y + 7);
    doc.text("Catégorie tarifaire", leftX + 130, y + 7);
    y += 10;

    for (let i = 0; i < passengers.length; i++) {
        const p = passengers[i];
        // Nouvelle page si besoin — SANS logo, SANS bandes
        if (y > 265) {
            doc.addPage();
            y = 20;
            doc.setFillColor(230, 230, 230);
            doc.rect(leftX, y, 180, 10, 'F');
            doc.setFont("helvetica", "bold");
            doc.text("Passager (suite)", leftX + 3, y + 7);
            doc.text("Type de passager", leftX + 75, y + 7);
            doc.text("Catégorie tarifaire", leftX + 130, y + 7);
            y += 10;
        }
        if (i % 2 === 0) { doc.setFillColor(249, 249, 249); doc.rect(leftX, y, 180, 10, 'F'); }
        doc.setFont("helvetica", "normal");
        doc.setTextColor(0);
        const fullName = `${p.nom || ''} ${p.prenom || ''}`.trim() || booking.contact;
        doc.text(fullName, leftX + 3, y + 7);
        doc.text(p.type || 'Adulte', leftX + 75, y + 7);
        doc.text(p.type === 'Enfant' ? 'Tarif enfant' : 'Tarif adulte', leftX + 130, y + 7);
        doc.setDrawColor(220);
        doc.line(leftX, y + 10, 195, y + 10);
        y += 10;
    }

    // ===== PAIEMENT =====
    y += 14;
    if (y > 240) {
        doc.addPage();
        y = 20;
    }
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.setTextColor(0);
    doc.text("Détails paiement / Payment Details", leftX, y);

    y += 10;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.text(`Tarif total / Total Fare : ${booking.total} EUR`, leftX, y);

    y += 10;
    if (statusPayment === 'payé') {
        doc.setTextColor(40, 167, 69);
        doc.setFont("helvetica", "bold");
        doc.text("Statut du paiement : PAYÉ", leftX, y);
    } else {
        doc.setTextColor(220, 53, 69);
        doc.setFont("helvetica", "bold");
        doc.text("Statut du paiement : RESTE À PAYER SUR PLACE", leftX, y);
    }

    // ===== LOGO BAS DROITE =====
    y += 15;
    if (y > 230) {
        doc.addPage();
        y = 20;
    }
    const imgBas = await loadImage('Gemini_Generabbted_Image_.png');
    if (imgBas) { doc.addImage(imgBas, 'PNG', 150, y, 45, 45); }

    // ===== MENTIONS LÉGALES =====
    y += 50;
    if (y > 280) {
        doc.addPage();
        y = 20;
    }
    doc.setTextColor(100, 100, 100);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("Mentions légales / Notice", pageW / 2, y, { align: 'center' });
    y += 6;
    doc.setFont("helvetica", "normal");
    doc.text(
        "Lorsque ce document est délivré pour le transport, des conditions particulières peuvent s'appliquer. Ces termes et conditions peuvent être obtenues auprès de l'agent émetteur AB MOTORS. Ce document est un reçu de paiement et de réservation. Merci d'avoir choisi AB MOTORS pour votre traversée.",
        pageW / 2, y, { maxWidth: 180, align: 'center' }
    );

    const pdfBase64 = doc.output('datauristring').split(',')[1];

    try {
        await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow',
            body: JSON.stringify({ action: 'validate_booking', id: booking.id, email: booking.email, contact: booking.contact, pdfBase64, newStatus: fullStatus }) });
        alert("Statut mis à jour et PDF officiel envoyé !");
        await fetchData();
    } catch (err) { alert("Erreur d'envoi."); if(btn) { btn.disabled = false; btn.innerText = "Valider"; } }
};

window.supprRes = async (id) => {
    if(confirm('Supprimer définitivement cette réservation ?')) {
        document.getElementById('main-loader').style.display = 'inline-block';
        await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'delete_booking', id }) });
        await fetchData();
    }
};

const renderCalendarOnly = () => {
    const d = new Date(); d.setMonth(d.getMonth() + adminMonthOffset);
    const wrapper = document.getElementById('cal-wrapper');
    if (!wrapper) return;
    let nextM = d.getMonth() + 1, nextY = d.getFullYear();
    if (nextM > 11) { nextM = 0; nextY++; }
    wrapper.innerHTML = renderMonthAdmin(d.getFullYear(), d.getMonth()) + renderMonthAdmin(nextY, nextM);
    updateBulkPanel();
};

const updateBulkPanel = () => {
    const panel = document.getElementById('bulk-panel');
    if (!panel) return;
    if (selectedDates.size === 0) { panel.innerHTML = `<p style="margin:0;color:#888;font-size:13px;">Cliquez sur un ou plusieurs jours pour les sélectionner.</p>`; return; }
    const sorted = [...selectedDates].sort();
    panel.innerHTML = `<div class="inline-editor">
        <div><b style="color:#002157">${selectedDates.size} jour(s) sélectionné(s)</b><br><span style="font-size:11px;color:#666">${sorted.map(d=>d.split('-').reverse().join('/')).join(', ')}</span></div>
        <label style="cursor:pointer;font-weight:bold;display:flex;align-items:center;gap:5px;"><input type="checkbox" id="bulk-matin" checked style="width:18px;height:18px;"> Ouvrir Matin</label>
        <label style="cursor:pointer;font-weight:bold;display:flex;align-items:center;gap:5px;"><input type="checkbox" id="bulk-aprem" style="width:18px;height:18px;"> Ouvrir Après-midi</label>
        <button id="bulk-btn" class="refresh-btn" onclick="applyBulkDispo()" style="background:#28a745;">✓ Appliquer</button>
        <button class="refresh-btn" onclick="clearSelection()" style="background:#e53e3e;">✗ Annuler</button>
    </div>`;
};

const renderMonthAdmin = (year, month) => {
    let html = `<div class="month-container"><div class="month-header">${monthsNames[month]} ${year}</div>`;
    html += `<div class="weekdays"><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div></div><div class="days-grid">`;
    let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
    let daysInMonth = new Date(year, month + 1, 0).getDate();
    for(let i=0;i<firstDay;i++) html += `<div class="empty-day"></div>`;
    const todayStr = new Date().toISOString().split('T')[0];
    for(let d=1;d<=daysInMonth;d++) {
        let dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (dStr < todayStr) { html += `<div class="cal-day past" style="opacity:0.3;cursor:not-allowed;">${d}</div>`; continue; }
        let dispo = serverDates[dStr];
        let isAvail = dispo && (dispo.m || dispo.a);
        let isSelected = selectedDates.has(dStr);
        let cssClass = isAvail ? 'available' : '';
        if (isSelected) cssClass += ' selected-admin';
        let dotsHTML = '';
        if(isAvail && !isSelected) {
            dotsHTML = `<div class="time-dot-container">`;
            if(dispo.m) dotsHTML += `<div class="time-dot matin"></div>`;
            if(dispo.a) dotsHTML += `<div class="time-dot aprem"></div>`;
            dotsHTML += `</div>`;
        }
        html += `<div class="cal-day ${cssClass}" onclick="toggleDate('${dStr}')">${d}${dotsHTML}</div>`;
    }
    return html + `</div></div>`;
};

window.updateTable = () => {
    const tableContainer = document.getElementById('table-container');
    if (!tableContainer) return;
    const searchVal = document.getElementById('search-input') ? document.getElementById('search-input').value.trim().toLowerCase() : "";
    let html = `<div class="table-responsive"><table><tr><th>ID</th><th>Client</th><th>Trajet & Date</th><th>Pax</th><th>Total</th><th>Statut</th><th>Action</th></tr>`;
    const filtered = serverBookings.filter(b => {
        if (searchVal === "") return true;
        return String(b.id).toLowerCase().includes(searchVal);
    });
    filtered.forEach(b => {
        let actionsHTML = '';
        const sl = b.status ? b.status.toLowerCase() : '';
        if (sl === 'en attente') {
            actionsHTML += `<button id="btn-valider-${b.id}" class="btn-action btn-paye" onclick="validerRes(${b.id},'payé')">Valider (PAYÉ)</button>`;
            actionsHTML += `<button class="btn-action btn-non-paye" onclick="validerRes(${b.id},'non payé')">Valider (NON PAYÉ)</button>`;
        } else if (sl === 'confirmée et non payée') {
            actionsHTML += `<button id="btn-valider-${b.id}" class="btn-action btn-paye" onclick="validerRes(${b.id},'payé')">Marquer PAYÉ</button>`;
        }
        actionsHTML += `<button class="btn-action btn-suppr" onclick="supprRes(${b.id})">Supprimer</button>`;
        const badgeClass = sl === 'confirmée et payée' ? 'confirmee' : 'attente';
        html += `<tr>
            <td>${b.id}</td>
            <td>${b.contact}<br><small>${b.phone}<br>${b.email}</small></td>
            <td style="font-size:11px;">${b.details}</td>
            <td>${b.pax}</td><td>${b.total}€</td>
            <td><span class="badge ${badgeClass}">${b.status}</span></td>
            <td style="width:140px;min-width:140px;">${actionsHTML}</td>
        </tr>`;
    });
    if (filtered.length === 0) html += `<tr><td colspan="7" style="text-align:center">Aucune réservation trouvée.</td></tr>`;
    tableContainer.innerHTML = html + `</table></div>`;
};

const render = () => {
    const content = document.getElementById('content');
    if (currentView === 'dates') {
        const d = new Date(); d.setMonth(d.getMonth() + adminMonthOffset);
        let nextM = d.getMonth() + 1, nextY = d.getFullYear();
        if(nextM > 11) { nextM = 0; nextY++; }
        content.innerHTML = `
        <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:15px;gap:10px;">
            <p style="margin:0;">Cliquez sur un ou <b>plusieurs jours</b> pour les sélectionner.</p>
            <div style="display:flex;gap:10px;">
                <button class="refresh-btn" onclick="changeAdminMonth(-1)">← Mois Précédent</button>
                <button class="refresh-btn" onclick="changeAdminMonth(1)">Mois Suivant →</button>
            </div>
        </div>
        <div class="legend" style="margin-bottom:10px;">
            <div><span class="time-dot matin"></span> Matin</div>
            <div><span class="time-dot aprem"></span> Après-midi</div>
            <div><span style="display:inline-block;width:12px;height:12px;background:#002157;border-radius:2px;"></span> Sélectionné</div>
        </div>
        <div id="cal-wrapper" class="calendar-wrapper">
            ${renderMonthAdmin(d.getFullYear(), d.getMonth())}
            ${renderMonthAdmin(nextY, nextM)}
        </div>
        <div id="bulk-panel" style="margin-top:15px;">
            <p style="margin:0;color:#888;font-size:13px;">Cliquez sur un ou plusieurs jours pour les sélectionner.</p>
        </div>`;
    } else {
        content.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <input type="text" id="search-input" class="search-box" placeholder="Rechercher par numéro de réservation" oninput="updateTable()">
            </div>
            <div id="table-container"></div>`;
        updateTable();
    }
};

// ===== INIT =====
(function init() {
    if (isAuthenticated()) {
        refreshSession();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-app').style.display = 'block';
        fetchData();
    }
})();
</script>
