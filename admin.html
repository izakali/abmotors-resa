<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - AB MOTORS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #002157; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; background: #e0e0e0; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .nav-btn.active { background: #002157; color: white; }
        .calendar-wrapper { display: flex; gap: 20px; flex-wrap: wrap; }
        .month-container { flex: 1; min-width: 300px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; }
        .month-header { text-align: center; font-weight: bold; color: #002157; margin-bottom: 15px; text-transform: uppercase; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 12px; color: #888; margin-bottom: 10px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 4px; cursor: pointer; position: relative; background: #f9f9f9; color: #ccc; border: 1px solid transparent; transition: 0.2s; }
        .cal-day.available { background-color: #f0f8ff; color: #002157; font-weight: bold; border-color: #cce5ff; }
        .cal-day.available:hover { border-color: #002157; }
        .cal-day.selected-admin { background-color: #002157; color: white; transform: scale(1.05); }
        .cal-day:hover:not(.past) { border-color: #002157; }
        .empty-day { aspect-ratio: 1; }
        .time-dot-container { display: flex; gap: 3px; position: absolute; bottom: 3px; }
        .time-dot { width: 6px; height: 6px; border-radius: 50%; }
        .time-dot.matin { background-color: #f6ad55; }
        .time-dot.aprem { background-color: #4fd1c5; }
        .cal-day.selected-admin .time-dot { background-color: #fff; }
        .legend { margin-top: 15px; font-size: 13px; color: #666; display: flex; gap: 15px; }
        .legend div { display: flex; align-items: center; gap: 5px; }
        .inline-editor { background: #f0f8ff; border: 1px solid #cce5ff; padding: 15px; border-radius: 8px; margin-top: 15px; display: flex; gap: 20px; align-items: center; }
        .inline-editor h3 { margin: 0; color: #002157; font-size: 16px; }
        .inline-editor label { cursor: pointer; font-weight: bold; color: #333; display:flex; align-items:center; gap:5px;}
        .inline-editor input { width: 18px; height: 18px; cursor:pointer;}
        
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; min-width: 700px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { color: #002157; }
        
        .badge { display: inline-block; white-space: nowrap; padding: 6px 10px; border-radius: 12px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .badge.attente { background: #fff8f0; color: #b7791f; border: 1px solid #fbd38d; }
        .badge.confirmee { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .btn-action { cursor: pointer; padding: 6px 12px; border: none; border-radius: 4px; color: white; font-weight: bold; margin-bottom:4px; display:block; width:100%; font-size:12px; }
        .btn-paye { background: #28a745; }
        .btn-non-paye { background: #f6ad55; }
        .btn-suppr { background: #e53e3e; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-btn { background: #00a8cc; color:white; border:none; border-radius:4px; font-size: 14px; padding: 8px 15px; cursor:pointer;}
        .loader { display: none; margin-left: 10px; font-size: 14px; color: #666; font-weight: normal; }
        .search-box { margin-bottom: 15px; width: 100%; max-width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .admin-container { padding: 15px; }
            h1 { flex-direction: column; align-items: flex-start; gap: 10px; font-size: 20px; }
            .nav { flex-wrap: wrap; }
            .nav-btn { flex: 1; text-align: center; }
            .calendar-wrapper { flex-direction: column; }
            .month-container { min-width: 100%; }
            .inline-editor { flex-direction: column; align-items: flex-start; }
            .search-box { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Dashboard Admin <button class="refresh-btn" onclick="fetchData()">Rafraîchir <span id="main-loader" class="loader">⏳</span></button></h1>
        <div class="nav">
            <div class="nav-btn active" id="btn-dates" onclick="setView('dates')">Gérer les Dates</div>
            <div class="nav-btn" id="btn-res" onclick="setView('res')">Voir les Réservations</div>
        </div>
        <div id="content">Chargement des données...</div>
    </div>

    <script>
        const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxv_TQQ-HLA7jMStWDIEpDNlIlUpN44GRbhVQIbYlxxiyQKRVvLRiJOLSB_i4Yz4OKn/exec';

        let serverDates = {};
        let serverBookings = [];
        let currentView = 'dates';
        let adminMonthOffset = 0;
        let selectedDates = new Set();
        
        const monthsNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        const loadImage = (url) => new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = url;
        });

        async function fetchData() {
            document.getElementById('main-loader').style.display = 'inline-block';
            try {
                const response = await fetch(GOOGLE_WEB_APP_URL, { method: 'GET', redirect: 'follow' });
                if (!response.ok) throw new Error("HTTP error");
                const data = await response.json();
                serverDates = data.dates || {};
                serverBookings = data.bookings || [];
                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `<div style="color:red; font-weight:bold;">Erreur réseau. Vérifiez votre URL Google.</div>`;
            }
            document.getElementById('main-loader').style.display = 'none';
        }

        const setView = (v) => { 
            currentView = v; 
            document.getElementById('btn-dates').className = `nav-btn ${v==='dates'?'active':''}`;
            document.getElementById('btn-res').className = `nav-btn ${v==='res'?'active':''}`;
            render(); 
        };

        window.changeAdminMonth = (dir) => { adminMonthOffset += dir; render(); };

        window.toggleDate = (dStr) => {
            if (selectedDates.has(dStr)) selectedDates.delete(dStr);
            else selectedDates.add(dStr);
            renderCalendarOnly();
        };

        window.clearSelection = () => { selectedDates.clear(); renderCalendarOnly(); };

        window.applyBulkDispo = async () => {
            if (selectedDates.size === 0) return;
            const isM = document.getElementById('bulk-matin').checked;
            const isA = document.getElementById('bulk-aprem').checked;
            const newDispo = (isM || isA) ? {m: isM, a: isA} : null;

            document.getElementById('main-loader').style.display = 'inline-block';
            document.getElementById('bulk-btn').disabled = true;
            document.getElementById('bulk-btn').innerText = 'Sauvegarde...';

            const promises = [...selectedDates].map(dStr =>
                fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow',
                    body: JSON.stringify({ action: 'update_dates', dateStr: dStr, dispo: newDispo }) })
                .then(() => {
                    if (newDispo) serverDates[dStr] = newDispo; else delete serverDates[dStr];
                })
            );

            try {
                await Promise.all(promises);
                selectedDates.clear();
                render();
            } catch(e) { alert("Erreur lors de la sauvegarde groupée."); }

            document.getElementById('main-loader').style.display = 'none';
        };

        window.validerRes = async (id, statusPayment) => {
            const booking = serverBookings.find(b => b.id == id);
            if(!booking) return;
            const fullStatus = statusPayment === 'payé' ? 'Confirmée et payée' : 'Confirmée et non payée';
            const btn = document.getElementById('btn-valider-' + id);
            if(btn) { btn.disabled = true; btn.innerText = "Génération PDF..."; }
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF();
            const imgHaut = await loadImage('unnammmed.png');
            if (imgHaut) {
                const logoW = 42;
                const ratio = imgHaut.naturalHeight / imgHaut.naturalWidth;
                const logoH = logoW * ratio;
                doc.addImage(imgHaut, 'PNG', 15, 10, logoW, logoH);
            } else {
                doc.setFillColor(252, 210, 28); doc.rect(15, 10, 42, 10, 'F');
                doc.setFillColor(255, 255, 255); doc.rect(15, 20, 42, 12, 'F');
                doc.setFillColor(206, 17, 38); doc.rect(15, 32, 42, 10, 'F');
                doc.setFontSize(8); doc.setTextColor(0, 0, 0); doc.setFont("helvetica", "bold");
                doc.text("AB MOTORS", 36, 28, null, null, "center");
            }
            doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text("Votre reçu d'achat de services / Booking Receipt", 105, 80, null, null, "center");
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(`Numéro de réservation / Booking Ref : # ${booking.id}`, 15, 95);
            doc.text(`Passager / Passenger : ${booking.contact}`, 15, 101);
            doc.text(`Téléphone : ${booking.phone}`, 15, 107);
            doc.text(`Agence émettrice / Issuing office : AB MOTORS`, 100, 95);
            doc.text(`(+269) 3315118`, 100, 101);
            doc.text(`(+269) 4350423`, 100, 107);
            doc.text(`Date d'émission / Date of Issuance : ${new Date().toLocaleDateString('fr-FR')}`, 100, 113);
            doc.setFillColor(240, 240, 240); doc.rect(15, 125, 180, 10, 'F');
            doc.setFont("helvetica", "bold");
            doc.text("Trajet / Route", 20, 131); doc.text("Dates / Horaires", 80, 131);
            doc.text("Statut", 140, 131); doc.text("Passagers", 170, 131);
            doc.setFont("helvetica", "normal");
            let route = booking.details.split('|')[0].trim();
            let depDate = booking.details.split('|')[1] ? booking.details.split('|')[1].trim() : "";
            doc.text(route, 20, 142); doc.text(depDate, 80, 142);
            doc.text("Confirmé", 140, 142); doc.text(booking.pax.split(' ')[0], 170, 142);
            doc.setFont("helvetica", "bold");
            doc.text("Détails paiement / Payment Details", 15, 165);
            doc.setFont("helvetica", "normal");
            doc.text(`Tarif total / Total Fare : ${booking.total} EUR`, 15, 173);
            if(statusPayment === 'payé') {
                doc.setTextColor(40, 167, 69); doc.setFont("helvetica", "bold");
                doc.text("Statut du paiement : PAYÉ", 15, 181);
            } else {
                doc.setTextColor(220, 53, 69); doc.setFont("helvetica", "bold");
                doc.text("Statut du paiement : RESTE À PAYER SUR PLACE", 15, 181);
            }
            const imgBas = await loadImage('Gemini_Generabbted_Image_.png');
            if (imgBas) { doc.addImage(imgBas, 'PNG', 150, 185, 40, 40); }
            doc.setTextColor(100, 100, 100); doc.setFont("helvetica", "normal"); doc.setFontSize(11);
            doc.text("Mentions légales / Notice", 105, 245, null, null, "center");
            doc.setFontSize(10);
            let notice = "Lorsque ce document est délivré pour le transport, des conditions particulières peuvent s'appliquer.\nCes termes et conditions peuvent être obtenues auprès de l'agent émetteur AB MOTORS.\nCe document est un reçu de paiement et de réservation.\nMerci d'avoir choisi AB MOTORS pour votre traversée.";
            doc.text(notice, 105, 252, { maxWidth: 180, align: "center" });
            const pdfBase64 = doc.output('datauristring').split(',')[1];
            try {
                await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'validate_booking', id: booking.id, email: booking.email, contact: booking.contact, pdfBase64: pdfBase64, newStatus: fullStatus }) });
                alert("Statut mis à jour et PDF officiel envoyé !"); 
                await fetchData();
            } catch (err) { alert("Erreur d'envoi."); if(btn) { btn.disabled = false; btn.innerText = "Valider"; } }
        };

        window.supprRes = async (id) => {
            if(confirm('Supprimer définitivement cette réservation ?')) {
                document.getElementById('main-loader').style.display = 'inline-block';
                await fetch(GOOGLE_WEB_APP_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify({ action: 'delete_booking', id: id }) });
                await fetchData();
            }
        };

        const renderCalendarOnly = () => {
            const d = new Date();
            d.setMonth(d.getMonth() + adminMonthOffset);
            const wrapper = document.getElementById('cal-wrapper');
            if (!wrapper) return;
            let nextM = d.getMonth() + 1, nextY = d.getFullYear();
            if (nextM > 11) { nextM = 0; nextY++; }
            wrapper.innerHTML = renderMonthAdmin(d.getFullYear(), d.getMonth()) + renderMonthAdmin(nextY, nextM);
            updateBulkPanel();
        };

        const updateBulkPanel = () => {
            const panel = document.getElementById('bulk-panel');
            if (!panel) return;
            if (selectedDates.size === 0) {
                panel.innerHTML = `<p style="margin:0;color:#888;font-size:13px;">Cliquez sur un ou plusieurs jours pour les sélectionner.</p>`;
                return;
            }
            const sorted = [...selectedDates].sort();
            panel.innerHTML = `
                <div class="inline-editor" style="flex-wrap:wrap; gap:15px;">
                    <div>
                        <b style="color:#002157">${selectedDates.size} jour(s) sélectionné(s)</b><br>
                        <span style="font-size:11px;color:#666">${sorted.map(d=>d.split('-').reverse().join('/')).join(', ')}</span>
                    </div>
                    <label><input type="checkbox" id="bulk-matin" checked> Ouvrir Matin</label>
                    <label><input type="checkbox" id="bulk-aprem"> Ouvrir Après-midi</label>
                    <button id="bulk-btn" class="refresh-btn" onclick="applyBulkDispo()" style="background:#28a745;">
                        ✓ Appliquer
                    </button>
                    <button class="refresh-btn" onclick="clearSelection()" style="background:#e53e3e;">
                        ✗ Annuler
                    </button>
                </div>`;
        };

        const renderMonthAdmin = (year, month) => {
            let html = `<div class="month-container"><div class="month-header">${monthsNames[month]} ${year}</div>`;
            html += `<div class="weekdays"><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div></div><div class="days-grid">`;
            let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<firstDay; i++) html += `<div class="empty-day"></div>`;
            const todayStr = new Date().toISOString().split('T')[0];
            for(let d=1; d<=daysInMonth; d++) {
                let dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if (dStr < todayStr) { html += `<div class="cal-day past" style="opacity:0.3; cursor:not-allowed;">${d}</div>`; continue; }
                let dispo = serverDates[dStr];
                let isAvail = dispo && (dispo.m || dispo.a);
                let isSelected = selectedDates.has(dStr);
                let cssClass = isAvail ? 'available' : '';
                if (isSelected) cssClass += ' selected-admin';
                let dotsHTML = '';
                if(isAvail && !isSelected) {
                    dotsHTML = `<div class="time-dot-container">`;
                    if(dispo.m) dotsHTML += `<div class="time-dot matin"></div>`;
                    if(dispo.a) dotsHTML += `<div class="time-dot aprem"></div>`;
                    dotsHTML += `</div>`;
                }
                html += `<div class="cal-day ${cssClass}" onclick="toggleDate('${dStr}')">${d}${dotsHTML}</div>`;
            }
            return html + `</div></div>`;
        };

        window.updateTable = () => {
            const tableContainer = document.getElementById('table-container');
            if (!tableContainer) return;
            const searchVal = document.getElementById('search-input')
                ? document.getElementById('search-input').value.trim().toLowerCase() : "";

            let html = `<div class="table-responsive"><table><tr><th>ID</th><th>Client</th><th>Trajet & Date</th><th>Pax</th><th>Total</th><th>Statut</th><th>Action</th></tr>`;
            const filtered = serverBookings.filter(b => {
                if (searchVal === "") return true;
                return String(b.id).toLowerCase().includes(searchVal) || `# ${b.id}`.toLowerCase().includes(searchVal);
            });

            filtered.forEach(b => {
                let actionsHTML = '';
                const sl = b.status ? b.status.toLowerCase() : '';
                if (sl === 'en attente') {
                    actionsHTML += `<button id="btn-valider-${b.id}" class="btn-action btn-paye" onclick="validerRes(${b.id}, 'payé')">Valider (PAYÉ)</button>`;
                    actionsHTML += `<button class="btn-action btn-non-paye" onclick="validerRes(${b.id}, 'non payé')">Valider (NON PAYÉ)</button>`;
                } else if (sl === 'confirmée et non payée') {
                    actionsHTML += `<button id="btn-valider-${b.id}" class="btn-action btn-paye" onclick="validerRes(${b.id}, 'payé')">Marquer PAYÉ</button>`;
                }
                actionsHTML += `<button class="btn-action btn-suppr" onclick="supprRes(${b.id})">Supprimer</button>`;
                const badgeClass = sl === 'confirmée et payée' ? 'confirmee' : 'attente';
                html += `<tr>
                    <td>#${b.id}</td>
                    <td>${b.contact}<br><small>${b.phone}<br>${b.email}</small></td>
                    <td style="font-size:11px;">${b.details}</td>
                    <td>${b.pax}</td><td>${b.total}€</td>
                    <td><span class="badge ${badgeClass}">${b.status}</span></td>
                    <td style="width:140px; min-width:140px;">${actionsHTML}</td>
                </tr>`;
            });

            if (filtered.length === 0) html += `<tr><td colspan="7" style="text-align:center">Aucune réservation trouvée.</td></tr>`;
            tableContainer.innerHTML = html + `</table></div>`;
        };

        const render = () => {
            const content = document.getElementById('content');
            if (currentView === 'dates') {
                const d = new Date();
                d.setMonth(d.getMonth() + adminMonthOffset);
                let nextM = d.getMonth() + 1, nextY = d.getFullYear();
                if(nextM > 11) { nextM = 0; nextY++; }

                content.innerHTML = `
                <div style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; margin-bottom:15px; gap:10px;">
                    <p style="margin:0;">Cliquez sur un ou <b>plusieurs jours</b> pour les sélectionner.</p>
                    <div style="display:flex; gap:10px;">
                        <button class="refresh-btn" onclick="changeAdminMonth(-1)">← Mois Précédent</button>
                        <button class="refresh-btn" onclick="changeAdminMonth(1)">Mois Suivant →</button>
                    </div>
                </div>
                <div class="legend" style="margin-bottom:10px;">
                    <div><span class="time-dot matin"></span> Matin</div>
                    <div><span class="time-dot aprem"></span> Après-midi</div>
                    <div><span style="display:inline-block;width:12px;height:12px;background:#002157;border-radius:2px;"></span> Sélectionné</div>
                </div>
                <div id="cal-wrapper" class="calendar-wrapper">
                    ${renderMonthAdmin(d.getFullYear(), d.getMonth())}
                    ${renderMonthAdmin(nextY, nextM)}
                </div>
                <div id="bulk-panel" style="margin-top:15px;">
                    <p style="margin:0;color:#888;font-size:13px;">Cliquez sur un ou plusieurs jours pour les sélectionner.</p>
                </div>`;
            } else {
                content.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <input type="text" id="search-input" class="search-box"
                               placeholder="Rechercher # Numéro de réservation"
                               oninput="updateTable()">
                    </div>
                    <div id="table-container"></div>`;
                updateTable();
            }
        };

        fetchData();
    </script>
</body>
</html>
